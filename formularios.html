    <!-- Formulario -->
    <form action="https://formsubmit.co/kiara.c.a.369@gmail.com" method="POST">

        <!-- Nombre -->
        <div class="grupo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>

        <!-- Apellidos -->
        <div class="grupo">
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required>
        </div>

        <!-- Pregunta: ¿Qué te gustó más? -->
        <div class="grupo box">
            <strong>¿QUÉ TE GUSTÓ MÁS?</strong>
            <label><input type="radio" name="gustos" value="calidad"> CALIDAD</label>
            <label><input type="radio" name="gustos" value="precio"> PRECIO</label>

        </div>

        <!-- Pregunta: ¿Nos recomendarías? -->
        <div class="grupo box">
            <strong>¿NOS RECOMENDARÍAS?</strong>
            <label><input type="radio" name="recomendacion" value="si"> Sí</label>
            <label><input type="radio" name="recomendacion" value="no"> No</label>
            <label><input type="radio" name="recomendacion" value="talvez"> Tal vez</label>
            <label><input type="radio" name="recomendacion" value="poco"> Muy Poco</label>
        </div>

        <!-- Sugerencia 1 -->
        <div class="grupo">
            <label for="sugerencia">¿Qué sugerencia nos das?</label>
            <textarea name="sugerencia" id="sugerencia" rows="4"></textarea>
        </div>

        <!-- Sugerencia 2 -->
        <div class="grupo">
            <label for="gustaria">¿Qué te gustaría ver en el futuro?</label>
            <textarea name="gustaria" id="gustaria" rows="4"></textarea>
        </div>

        <!-- Botón enviar -->
        <button type="submit">Enviar</button>
    </form>
